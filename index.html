<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Abouali">
<title>Abouali</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');
[data-theme="dark"]{--bg:#0c0b08;--s1:#161410;--s2:#1e1b15;--s3:#26221a;--border:#2f2b22;--text:#ede8df;--muted:#6b6254;--muted2:#9a8f7d;}
[data-theme="light"]{--bg:#f5f2eb;--s1:#ede8df;--s2:#e4ddd2;--s3:#d9d0c4;--border:#c8beaf;--text:#1a1814;--muted:#8a7f6e;--muted2:#5a5045;}
:root{--gold:#c8a145;--gold2:#e2c47a;--amber:#d4883a;--green:#5fa864;--red:#d95f4b;--blue:#4a82c4;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;transition:background .25s,color .25s;}
.view{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;}
.view.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.sPad{height:calc(var(--safe-bot) + 24px);}

/* HOME HEADER */
.hHdr{background:var(--s1);border-bottom:1px solid var(--border);padding:calc(var(--safe-top) + 8px) 16px 13px;flex-shrink:0;}
.hBrand{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:11px;}
.brandName{font-family:'Cormorant Garamond',serif;font-size:33px;font-weight:700;color:var(--gold);letter-spacing:-1px;line-height:1;}
.brandSub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
.brandRight{display:flex;flex-direction:column;align-items:flex-end;gap:5px;}
.brandDate{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted2);text-align:right;line-height:1.4;}
.themeBtn{background:var(--s2);border:1px solid var(--border);border-radius:7px;color:var(--muted2);font-size:13px;padding:3px 7px;cursor:pointer;font-family:'Outfit',sans-serif;}
.srchWrap{position:relative;margin-bottom:11px;}
.srchIn{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 34px;color:var(--text);font-size:14px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none;}
.srchIn:focus{border-color:var(--gold);}
.srchIn::placeholder{color:var(--muted);}
.srchIco{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.kpiRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:9px 5px;text-align:center;}
.kpiVal{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:500;line-height:1;}
.kpiVal.g{color:var(--green);}.kpiVal.r{color:var(--red);}.kpiVal.a{color:var(--gold2);}
.kpiLbl{font-size:8px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.secLbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:12px 16px 6px;}
/* BAIL CARD */
.bailCard{background:var(--s2);border:1px solid var(--border);border-radius:13px;margin:0 13px 9px;padding:13px 13px 13px 17px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s;-webkit-user-select:none;}
.bailCard:active{background:var(--s3);}
.bailAccent{position:absolute;left:0;top:0;bottom:0;width:3px;}
.bailTop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;}
.bailName{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.1;}
.bailPreneur{font-size:11px;color:var(--muted2);margin-top:2px;}
.bailTopR{display:flex;align-items:center;gap:5px;}
.alertDot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.bailChev{color:var(--muted);font-size:15px;}
.bailStats{display:flex;gap:6px;}
.bSt{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:7px;padding:6px 3px;text-align:center;}
.bStV{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;}
.bStL{font-size:8px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
/* ENGAGEMENT ALERT HOME */
.engWarn{background:rgba(212,136,58,.1);border:1px solid rgba(212,136,58,.3);border-radius:9px;margin:0 13px 7px;padding:8px 12px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--amber);}
.btnAddBail{margin:4px 13px 0;width:calc(100% - 26px);background:transparent;border:2px dashed var(--border);border-radius:13px;padding:15px;color:var(--muted2);font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.btnAddBail:active{border-color:var(--gold);color:var(--gold);}
/* TOPBAR */
.topbar{display:flex;align-items:center;gap:9px;padding:calc(var(--safe-top) + 7px) 13px 9px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tbBack{width:33px;height:33px;border-radius:9px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;color:var(--gold);flex-shrink:0;}
.tbTitle{flex:1;min-width:0;}
.tbTitle h2{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbTitle p{font-size:10px;color:var(--muted2);margin-top:1px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbBtns{display:flex;gap:6px;}
.tbAct{width:33px;height:33px;border-radius:9px;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;color:#0c0b08;font-weight:700;flex-shrink:0;}
.tbEdit{width:33px;height:33px;border-radius:9px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;color:var(--muted2);flex-shrink:0;}
/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tabBtn{flex:1;padding:9px 2px;font-size:11px;font-weight:600;color:var(--muted2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'Outfit',sans-serif;}
.tabBtn.active{color:var(--gold);border-bottom-color:var(--gold);}
/* MINI STATS 4 cols */
.mStats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:5px;padding:8px 13px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.mKpi{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:7px 3px;text-align:center;}
.mKpiV{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;line-height:1;}
.mKpiL{font-size:7px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.3px;}
.tabPane{display:none;}.tabPane.active{display:block;}
/* LOYER CARDS */
.lCard{background:var(--s2);border:1px solid var(--border);border-radius:11px;margin:0 13px 7px;overflow:hidden;}
.lcHd{display:flex;justify-content:space-between;align-items:center;padding:10px 12px 10px 15px;position:relative;cursor:pointer;}
.lcHd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.lCard.paye .lcHd::before{background:var(--green);}
.lCard.impaye .lcHd::before{background:var(--red);}
.lCard.partiel .lcHd::before{background:var(--amber);}
.lCard.attente .lcHd::before{background:var(--muted);}
.lCard.franchise .lcHd::before{background:var(--blue);}
.lcMois{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;}
.lcR{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.lcMt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--gold2);}
.pill{font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;}
.pill.paye{background:rgba(95,168,100,.15);color:var(--green);border:1px solid rgba(95,168,100,.3);}
.pill.impaye{background:rgba(217,95,75,.15);color:var(--red);border:1px solid rgba(217,95,75,.3);}
.pill.partiel{background:rgba(212,136,58,.15);color:var(--amber);border:1px solid rgba(212,136,58,.3);}
.pill.attente{background:rgba(107,98,84,.15);color:var(--muted2);border:1px solid rgba(107,98,84,.2);}
.pill.franchise{background:rgba(74,130,196,.15);color:var(--blue);border:1px solid rgba(74,130,196,.3);}
.lcDet{display:none;padding:0 12px 11px 15px;border-top:1px solid var(--border);}
.lcDet.open{display:block;}
.dRow{display:flex;justify-content:space-between;padding:3px 0;font-size:11px;}
.dRow span:first-child{color:var(--muted2);}
.dRow span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text);font-size:11px;}
.lcActs{display:flex;gap:6px;margin-top:8px;}
.btnPay{flex:1;background:linear-gradient(135deg,var(--gold),var(--amber));color:#0c0b08;font-weight:700;font-size:11px;padding:8px 6px;border:none;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;}
.btnEPay{background:var(--s3);border:1px solid var(--border);color:var(--muted2);font-size:11px;padding:8px 10px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;}
.btnDPay{background:rgba(217,95,75,.1);border:1px solid rgba(217,95,75,.3);color:var(--red);font-size:11px;padding:8px 10px;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;}
/* FINANCES TAB */
.finSec{padding:11px 13px 0;}
.finT{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;}
.progWrap{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;}
.progLbl{display:flex;justify-content:space-between;font-size:11px;margin-bottom:7px;}
.progLbl span:first-child{color:var(--muted2);}
.progLbl span:last-child{font-family:'JetBrains Mono',monospace;color:var(--gold2);}
.progBar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.progFill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:3px;}
.progStats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:10px;}
.pSV{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;text-align:center;}
.pSL{font-size:8px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;text-align:center;}
.annualTbl{background:var(--s2);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-top:7px;}
.annHd{display:grid;grid-template-columns:1fr 1.4fr 1.4fr 1.4fr;padding:7px 11px;background:var(--s3);border-bottom:1px solid var(--border);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'JetBrains Mono',monospace;}
.annRow{display:grid;grid-template-columns:1fr 1.4fr 1.4fr 1.4fr;padding:9px 11px;border-bottom:1px solid var(--border);align-items:center;}
.annRow:last-child{border-bottom:none;}
.annY{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;}
.annV{font-family:'JetBrains Mono',monospace;font-size:11px;}
.engCard{background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-top:7px;}
.engCT{font-size:10px;color:var(--muted2);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.engCV{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--text);}
.engCS{font-size:11px;color:var(--muted2);margin-top:3px;}
.revTbl{background:var(--s2);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-top:7px;}
/* ECHEANCIER */
.echTbl{background:var(--s2);border:1px solid var(--border);border-radius:11px;margin:0 13px;overflow:hidden;}
.echHd{display:grid;grid-template-columns:2fr 1.5fr 1fr;padding:7px 11px;background:var(--s3);border-bottom:1px solid var(--border);font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;}
.echRow{display:grid;grid-template-columns:2fr 1.5fr 1fr;padding:9px 11px;border-bottom:1px solid var(--border);align-items:center;}
.echRow:last-child{border-bottom:none;}
.echRow .em{font-family:'JetBrains Mono',monospace;color:var(--gold2);font-size:11px;}
.echRow .ed{font-size:11px;color:var(--muted2);}
/* INFOS TAB */
.infoBox{background:var(--s2);border:1px solid var(--border);border-radius:11px;margin:0 13px;overflow:hidden;}
.infoRow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;gap:10px;}
.infoRow:last-child{border-bottom:none;}
.infoRow span:first-child{color:var(--muted2);flex-shrink:0;font-size:11px;}
.infoRow span:last-child{font-family:'JetBrains Mono',monospace;font-size:10px;text-align:right;word-break:break-all;}
.expRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:11px 13px 0;}
.btnExp{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:13px 8px;cursor:pointer;transition:background .15s;}
.btnExp:active{background:var(--s3);}
.btnExpIco{font-size:20px;}
.btnExpLbl{font-size:12px;font-weight:600;color:var(--text);}
.btnExpSub{font-size:9px;color:var(--muted2);}
.btnEditBail{display:flex;align-items:center;justify-content:center;gap:8px;width:calc(100% - 26px);margin:11px 13px 0;background:var(--s2);border:1px solid var(--border);border-radius:11px;padding:12px;cursor:pointer;color:var(--gold2);font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;}
.delZone{margin:11px 13px;padding:11px;border-radius:9px;background:rgba(217,95,75,.07);border:1px solid rgba(217,95,75,.22);text-align:center;}
.btnDelBail{background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;padding:3px 10px;}
/* OVERLAYS & MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--s2);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:18px 18px 0 0;padding:17px 17px calc(var(--safe-bot) + 22px);width:100%;max-width:480px;animation:sUp .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes sUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mdDrag{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 13px;}
.mdTitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gold);margin-bottom:13px;}
.fLbl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;}
.fIn,.fSel,.fTa{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 12px;color:var(--text);font-size:15px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none;appearance:none;margin-bottom:10px;}
.fTa{resize:vertical;min-height:60px;margin-bottom:10px;}
.fIn:focus,.fSel:focus,.fTa:focus{border-color:var(--gold);}
.fRow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.fRow .fIn,.fRow .fSel{margin-bottom:0;}
.btnSub{width:100%;background:linear-gradient(135deg,var(--gold),var(--amber));color:#0c0b08;font-weight:700;font-size:15px;padding:13px;border:none;border-radius:12px;cursor:pointer;margin-top:3px;font-family:'Outfit',sans-serif;}
.btnCnl{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted2);font-size:14px;padding:11px;border-radius:12px;cursor:pointer;margin-top:7px;font-family:'Outfit',sans-serif;}
/* CONFIRM */
#cfBox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:600;align-items:flex-end;justify-content:center;}
#cfBox.open{display:flex;}
#cfInner{background:var(--s2);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:18px 18px 0 0;padding:20px 17px calc(var(--safe-bot) + 22px);width:100%;max-width:480px;animation:sUp .28s cubic-bezier(.4,0,.2,1);}
#cfMsg{font-size:14px;color:var(--text);text-align:center;line-height:1.5;margin-bottom:18px;}
.cfYes{width:100%;background:var(--red);color:#fff;font-weight:700;font-size:14px;padding:12px;border:none;border-radius:11px;cursor:pointer;font-family:'Outfit',sans-serif;}
.cfNo{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted2);font-size:13px;padding:11px;border-radius:11px;cursor:pointer;margin-top:7px;font-family:'Outfit',sans-serif;}
/* TOAST */
#toast{position:fixed;bottom:calc(var(--safe-bot)+14px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;color:var(--text);transition:transform .3s,opacity .3s;opacity:0;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>

<!-- ═══ HOME ═══ -->
<div class="view" id="vHome">
  <div class="hHdr">
    <div class="hBrand">
      <div><div class="brandName">Abouali</div><div class="brandSub">Gestion des baux commerciaux</div></div>
      <div class="brandRight">
        <div class="brandDate" id="hDate"></div>
        <button class="themeBtn" id="themeBtn">☀︎</button>
      </div>
    </div>
    <div class="srchWrap">
      <span class="srchIco">⌕</span>
      <input class="srchIn" id="srchIn" placeholder="Rechercher un bail…" oninput="renderHome()">
    </div>
    <div class="kpiRow">
      <div class="kpi"><div class="kpiVal a" id="kL">–</div><div class="kpiLbl">Loyers/mois</div></div>
      <div class="kpi"><div class="kpiVal g" id="kE">–</div><div class="kpiLbl">Encaissé</div></div>
      <div class="kpi"><div class="kpiVal r" id="kI">–</div><div class="kpiLbl">Impayé</div></div>
    </div>
  </div>
  <div class="scroll">
    <div class="secLbl">Baux actifs</div>
    <div id="bailsList"></div>
    <button class="btnAddBail" id="btnAdd">＋&nbsp; Ajouter un bail</button>
    <div class="sPad"></div>
  </div>
</div>

<!-- ═══ DETAIL ═══ -->
<div class="view hidden" id="vBail">
  <div class="topbar">
    <div class="tbBack" id="btnBack">‹</div>
    <div class="tbTitle"><h2 id="dName">–</h2><p id="dSub">–</p></div>
    <div class="tbBtns">
      <button class="tbEdit" id="btnEditB" title="Modifier le bail">✎</button>
      <button class="tbAct" id="btnAddPay">＋</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tabBtn active" data-tab="tSuivi">Suivi</button>
    <button class="tabBtn" data-tab="tFin">Finances</button>
    <button class="tabBtn" data-tab="tEch">Échéancier</button>
    <button class="tabBtn" data-tab="tInfos">Infos</button>
  </div>
  <div class="mStats">
    <div class="mKpi"><div class="mKpiV g" id="mE">–</div><div class="mKpiL">Encaissé</div></div>
    <div class="mKpi"><div class="mKpiV r" id="mI">–</div><div class="mKpiL">Impayé</div></div>
    <div class="mKpi"><div class="mKpiV" style="color:var(--blue)" id="mR">–</div><div class="mKpiL">Restant</div></div>
    <div class="mKpi"><div class="mKpiV a" id="mM">–</div><div class="mKpiL">Mois payés</div></div>

<script>
// ══ STORAGE ══
var DB='abouali_v5';
function dbGet(){try{return JSON.parse(localStorage.getItem(DB)||'null')||{baux:[],paiements:{}};}catch(e){return{baux:[],paiements:{}};}}
function dbSave(d){try{localStorage.setItem(DB,JSON.stringify(d));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function pad(n){return n<10?'0'+n:''+n;}
function fmtDate(s){if(!s)return'–';var p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0];}

// ══ INIT ══
function initDB(){
  var d=dbGet();
  if(d.baux.length===0){
    var id='miman_001';
    d.baux.push({id:id,nom:'Al Warda 11 + Warda 4',preneur:'Société MIMAN',rep:'Mounir MIMAN',

      activite:'Restauration (traiteurs et services de restauration)',
      debut:'2026-03-01',duree:9,loyer:22000,caution:132000,rib:'007 450 00061153004024 61 45',
      revision:'10/3',franchise:1,engagementMin:24,
      tranches:[{montant:18000,duree:5},{montant:20000,duree:6}],
      color:'#c8a145',
      notes:'TF Warda11: 04/56386 (25m²) | TF Warda4: 04/56379 (71m²)\nInterdiction alcool/tabac/jeux d\'argent\nEngagement min. 2 ans → perte caution si départ avant 28/02/2028\nCaution solidaire et indivisible: M. Mounir MIMAN\nSigné le 03/03/2026'});
    d.paiements[id]={
      '2026-03':{montant:0,date:'2026-03-01',mode:'Franchise',note:'Mois gratuit contractuel',statut:'paye'},
      '2026-04':{montant:18000,date:'2026-04-07',mode:'Virement bancaire',note:'',statut:'paye'}
    };
    dbSave(d);
  }
  // migrate: add missing fields
  var changed=false;
  dbGet().baux.forEach(function(b){
    if(b.engagementMin===undefined){b.engagementMin=0;changed=true;}
  });
  if(changed){var d2=dbGet();dbSave(d2);}
}

// ══ ÉCHEANCIER ══
function buildEch(bail){
  var months=[],cursor=new Date(bail.debut+'T00:00:00'),total=bail.duree*12;
  for(var i=0;i<total;i++){
    var y=cursor.getFullYear(),m=cursor.getMonth(),key=y+'-'+pad(m+1);
    var label=cursor.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
    var due=bail.loyer,isFr=false,pos=i;
    if(pos<(bail.franchise||0)){due=0;isFr=true;}
    else{
      pos-=(bail.franchise||0);var consumed=0,found=false;
      for(var t=0;t<bail.tranches.length;t++){if(pos<consumed+bail.tranches[t].duree){due=bail.tranches[t].montant;found=true;break;}consumed+=bail.tranches[t].duree;}
      if(!found&&bail.revision&&bail.revision!=='0/0'){var pts=bail.revision.split('/'),pct=parseInt(pts[0]),every=parseInt(pts[1]),periods=Math.floor((pos-consumed)/(every*12));due=Math.round(bail.loyer*Math.pow(1+pct/100,periods));}
    }
    months.push({key:key,label:label,due:due,isFr:isFr});
    cursor.setMonth(cursor.getMonth()+1);
  }
  return months;
}

function getStatut(mois,paid){
  var now=new Date(),pts=mois.key.split('-'),mDate=new Date(parseInt(pts[0]),parseInt(pts[1])-1,1),p=paid[mois.key];
  if(mois.isFr)return'franchise';if(!p)return mDate>now?'attente':'impaye';
  if(p.montant>=mois.due)return'paye';if(p.montant>0)return'partiel';
  return mDate>now?'attente':'impaye';
}

function computeStats(ech,paid){
  var now=new Date(),enc=0,imp=0,rest=0,mp=0;
  var paying=ech.filter(function(m){return!m.isFr&&m.due>0;});
  paying.forEach(function(mois){
    var s=getStatut(mois,paid),p=paid[mois.key];
    var pts=mois.key.split('-'),mDate=new Date(parseInt(pts[0]),parseInt(pts[1])-1,1);
    if(s==='paye'){mp++;enc+=mois.due;}
    else if(s==='impaye')imp+=mois.due;
    else if(s==='partiel'){enc+=(p?p.montant:0);imp+=mois.due-(p?p.montant:0);}
    else if(s==='attente')rest+=mois.due;
  });
  return{enc:enc,imp:imp,rest:rest,mp:mp,total:paying.length};
}

// ══ FORMAT ══
function fmt(n){return n===0?'0 DHS':n.toLocaleString('fr-FR')+' DHS';}
function fmtK(n){if(n>=1000000)return(Math.round(n/100000)/10)+' M';if(n>=1000)return(Math.round(n/100)/10)+' k';return n.toLocaleString('fr-FR');}

// ══ STATE ══
var currentBailId=null,editingBailId=null,editingPayKey=null,confirmCb=null,colorIdx=0;
var COLORS=['#c8a145','#4a82c4','#5fa864','#d4883a','#9a6cc8','#d95f4b','#4ab8c4'];
function nextColor(){return COLORS[colorIdx++%COLORS.length];}
function showView(id){document.querySelectorAll('.view').forEach(function(v){v.classList.add('hidden');});document.getElementById(id).classList.remove('hidden');}

// ══ HOME ══
function renderHome(){
  var d=dbGet(),now=new Date(),q=(document.getElementById('srchIn').value||'').toLowerCase();
  document.getElementById('hDate').innerHTML=now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+'<br>'+now.getFullYear();
  var totL=0,totE=0,totI=0,list=document.getElementById('bailsList');list.innerHTML='';
  d.baux.forEach(function(bail){
    if(q&&bail.nom.toLowerCase().indexOf(q)<0&&bail.preneur.toLowerCase().indexOf(q)<0&&(bail.adresse||'').toLowerCase().indexOf(q)<0)return;
    var ech=buildEch(bail),paid=d.paiements[bail.id]||{},stats=computeStats(ech,paid);
    var mKey=now.getFullYear()+'-'+pad(now.getMonth()+1),mc=ech.find(function(m){return m.key===mKey;});
    totL+=mc?mc.due:0;totE+=stats.enc;totI+=stats.imp;
    // Alert: any impayé in past?
    var hasAlert=stats.imp>0;
    // Engagement warning
    var engEnd=null,engWarn=false;
    if(bail.engagementMin>0){engEnd=new Date(bail.debut+'T00:00:00');engEnd.setMonth(engEnd.getMonth()+bail.engagementMin);var daysLeft=Math.round((engEnd-now)/(1000*60*60*24));engWarn=daysLeft>0&&daysLeft<=90;}
    if(engWarn){
      var wa=document.createElement('div');wa.className='engWarn';
      var dLeft=Math.round((engEnd-now)/(1000*60*60*24));
      wa.innerHTML='⚠ '+bail.nom+' — Engagement min. se termine dans '+dLeft+' jours ('+engEnd.toLocaleDateString('fr-FR')+')';
      list.appendChild(wa);
    }
    var div=document.createElement('div');div.className='bailCard';
    div.innerHTML='<div class="bailAccent" style="background:'+(bail.color||'#c8a145')+'"></div>'+
      '<div class="bailTop"><div><div class="bailName">'+bail.nom+'</div><div class="bailPreneur">'+bail.preneur+'</div></div>'+
      '<div class="bailTopR">'+(hasAlert?'<div class="alertDot"></div>':'')+'<div class="bailChev">›</div></div></div>'+
      '<div class="bailStats">'+
        '<div class="bSt"><div class="bStV" style="color:var(--green)">'+fmtK(stats.enc)+'</div><div class="bStL">Encaissé</div></div>'+
        '<div class="bSt"><div class="bStV" style="color:'+(stats.imp>0?'var(--red)':'var(--muted2)')+'">'+fmtK(stats.imp)+'</div><div class="bStL">Impayé</div></div>'+
        '<div class="bSt"><div class="bStV" style="color:var(--gold2)">'+stats.mp+'/'+stats.total+'</div><div class="bStL">Mois</div></div>'+
      '</div>';
    (function(bid){div.addEventListener('click',function(){openBail(bid);});})(bail.id);
    list.appendChild(div);
  });
  document.getElementById('kL').textContent=fmtK(totL);
  document.getElementById('kE').textContent=fmtK(totE);
  document.getElementById('kI').textContent=fmtK(totI);
}

// ══ DETAIL ══
function openBail(id){
  currentBailId=id;
  document.querySelectorAll('.tabBtn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tabPane').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tabBtn')[0].classList.add('active');
  document.getElementById('tSuivi').classList.add('active');
  renderDetail();showView('vBail');
}

function renderDetail(){
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  if(!bail)return;
  var ech=buildEch(bail),paid=d.paiements[currentBailId]||{},stats=computeStats(ech,paid);
  document.getElementById('dName').textContent=bail.nom;
  document.getElementById('dSub').textContent=bail.preneur;
  document.getElementById('payTitle').textContent='Paiement – '+bail.nom;
  document.getElementById('mE').textContent=fmtK(stats.enc);
  document.getElementById('mI').textContent=fmtK(stats.imp);
  document.getElementById('mR').textContent=fmtK(stats.rest);
  document.getElementById('mM').textContent=stats.mp+'/'+stats.total;
  // populate month select
  var sel=document.getElementById('payMois');sel.innerHTML='';
  ech.filter(function(m){return m.due>0;}).forEach(function(m){var opt=document.createElement('option');opt.value=m.key;opt.textContent=m.label+' — '+fmt(m.due);sel.appendChild(opt);});
  renderSuivi(ech,paid);
  renderFinances(ech,paid,bail);
  renderEchTable(ech);
  renderInfos(bail);
}

function renderSuivi(ech,paid){
  var list=document.getElementById('loyersList');list.innerHTML='';
  ech.forEach(function(mois){
    var s=getStatut(mois,paid),p=paid[mois.key];
    var card=document.createElement('div');card.className='lCard '+s;
    var pillTxt={paye:'✓ Payé',impaye:'✗ Impayé',partiel:'~ Partiel',attente:'À venir',franchise:'Franchise'}[s]||s;
    var detHtml='';
    if(p&&p.montant!==undefined){
      detHtml='<div class="dRow"><span>Montant reçu</span><span>'+fmt(p.montant)+'</span></div>';
      detHtml+='<div class="dRow"><span>Date</span><span>'+fmtDate(p.date)+'</span></div>';
      detHtml+='<div class="dRow"><span>Mode</span><span>'+(p.mode||'–')+'</span></div>';
      if(p.note)detHtml+='<div class="dRow"><span>Note</span><span>'+p.note+'</span></div>';
    }else{
      detHtml='<div style="font-size:11px;color:var(--muted2);padding:6px 0;text-align:center;">Aucun paiement enregistré</div>';
    }
    var acts='';
    if(s==='franchise'){acts='';}
    else if(s==='paye'||s==='partiel'){
      acts='<div class="lcActs"><button class="btnEPay" data-key="'+mois.key+'">✎ Modifier</button><button class="btnDPay" data-key="'+mois.key+'">✕ Supprimer</button></div>';
    } else {
      acts='<div class="lcActs"><button class="btnPay" data-key="'+mois.key+'">+ Enregistrer paiement</button></div>';
    }
    var kStr=mois.key;
    card.innerHTML='<div class="lcHd"><div class="lcMois">'+mois.label+'</div><div class="lcR"><span class="lcMt">'+fmt(mois.due)+'</span><span class="pill '+s+'">'+pillTxt+'</span></div></div>'+
      '<div class="lcDet" id="ld-'+kStr+'">'+detHtml+acts+'</div>';
    card.querySelector('.lcHd').addEventListener('click',function(){var el=document.getElementById('ld-'+kStr);if(el)el.classList.toggle('open');});
    list.appendChild(card);
  });
}

function renderFinances(ech,paid,bail){
  var now=new Date(),stats=computeStats(ech,paid);
  var pct=stats.total>0?Math.round(stats.mp/stats.total*100):0;
  // Annual breakdown
  var years={};
  ech.forEach(function(mois){
    var y=mois.key.split('-')[0];
    if(!years[y])years[y]={due:0,enc:0,imp:0};
    if(mois.isFr)return;
    var s=getStatut(mois,paid),p=paid[mois.key];
    years[y].due+=mois.due;
    if(s==='paye')years[y].enc+=mois.due;
    else if(s==='impaye')years[y].imp+=mois.due;
    else if(s==='partiel'){years[y].enc+=(p?p.montant:0);years[y].imp+=mois.due-(p?p.montant:0);}
  });
  // Revision history
  var revLines='';
  if(bail.revision&&bail.revision!=='0/0'){
    var pts=bail.revision.split('/'),pct2=parseInt(pts[0]),every=parseInt(pts[1]);
    var startDate=new Date(bail.debut+'T00:00:00');
    for(var i=1;i<=3;i++){
      var rd=new Date(startDate);rd.setFullYear(rd.getFullYear()+every*i);
      var newLoyer=Math.round(bail.loyer*Math.pow(1+pct2/100,i));
      revLines+='<div class="annRow"><span class="annY">'+rd.toLocaleDateString('fr-FR',{month:'short',year:'numeric'})+'</span>'+
        '<span class="annV" style="color:var(--gold2)">'+fmt(newLoyer)+'/mois</span>'+
        '<span class="annV" style="color:var(--muted2)">+'+pct2+'%</span>'+
        '<span class="annV" style="color:var(--muted2)">Révision '+(i)+'</span></div>';
    }
  }
  // Engagement min
  var engHtml='';
  if(bail.engagementMin>0){
    var engEnd=new Date(bail.debut+'T00:00:00');engEnd.setMonth(engEnd.getMonth()+bail.engagementMin);
    var daysLeft=Math.round((engEnd-now)/(1000*60*60*24));
    var engColor=daysLeft<0?'var(--green)':daysLeft<90?'var(--red)':'var(--gold2)';
    var engTxt=daysLeft<0?'Engagement terminé le '+engEnd.toLocaleDateString('fr-FR'):daysLeft+' jours restants ('+engEnd.toLocaleDateString('fr-FR')+')';
    engHtml='<div class="finSec"><div class="finT">Engagement minimum</div><div class="engCard">'+
      '<div class="engCT">Fin d\'engagement min.</div>'+
      '<div class="engCV" style="color:'+engColor+'">'+engTxt+'</div>'+
      '<div class="engCS">Caution perdue si départ avant cette date</div>'+
      '</div></div>';
  }
  var html='<div class="finSec"><div class="finT">Vue d\'ensemble</div>'+
    '<div class="progWrap">'+
      '<div class="progLbl"><span>Progression du bail</span><span>'+stats.mp+'/'+stats.total+' mois</span></div>'+
      '<div class="progBar"><div class="progFill" style="width:'+pct+'%"></div></div>'+
      '<div class="progStats">'+
        '<div><div class="pSV" style="color:var(--green)">'+fmtK(stats.enc)+'</div><div class="pSL">Encaissé</div></div>'+
        '<div><div class="pSV" style="color:var(--red)">'+fmtK(stats.imp)+'</div><div class="pSL">Impayé</div></div>'+
        '<div><div class="pSV" style="color:var(--blue)">'+fmtK(stats.rest)+'</div><div class="pSL">Restant</div></div>'+
      '</div>'+
    '</div></div>'+
    '<div class="finSec"><div class="finT">Par année</div>'+
    '<div class="annualTbl"><div class="annHd"><span>Année</span><span>Dû</span><span>Encaissé</span><span>Impayé</span></div>'+
    Object.keys(years).map(function(y){var yr=years[y];return'<div class="annRow"><span class="annY">'+y+'</span><span class="annV">'+fmtK(yr.due)+'</span><span class="annV" style="color:var(--green)">'+fmtK(yr.enc)+'</span><span class="annV" style="color:'+(yr.imp>0?'var(--red)':'var(--muted2)')+'">'+fmtK(yr.imp)+'</span></div>';}).join('')+
    '</div></div>'+
    engHtml+
    (revLines?'<div class="finSec"><div class="finT">Révisions de loyer</div><div class="revTbl"><div class="annHd"><span>Date</span><span>Nouveau loyer</span><span>Variation</span><span></span></div>'+revLines+'</div></div>':'');
  document.getElementById('finContent').innerHTML=html;
}

function renderEchTable(ech){
  var tbl=document.getElementById('echTbl'),groups=[],cur=null;
  ech.forEach(function(m){if(!cur||cur.due!==m.due){if(cur)groups.push(cur);cur={debut:m.label,due:m.due,count:1,isFr:m.isFr};}else cur.count++;});
  if(cur)groups.push(cur);
  tbl.innerHTML='<div class="echHd"><span>Début</span><span>Loyer/mois</span><span>Durée</span></div>';
  groups.forEach(function(g){var row=document.createElement('div');row.className='echRow';row.innerHTML='<span class="ed">'+g.debut+'</span><span class="em">'+(g.isFr?'GRATUIT':fmt(g.due))+'</span><span class="ed">'+g.count+' mois</span>';tbl.appendChild(row);});
}

function renderInfos(bail){
  var debut=new Date(bail.debut+'T00:00:00'),fin=new Date(debut);fin.setFullYear(fin.getFullYear()+bail.duree);fin.setDate(fin.getDate()-1);
  var rows=[['Preneur',bail.preneur||'–'],['Représentant',bail.rep||'–'],['Adresse',bail.adresse||'–'],['Activité',bail.activite||'–'],
    ['Début',debut.toLocaleDateString('fr-FR')],['Fin',fin.toLocaleDateString('fr-FR')],['Durée',bail.duree+' ans'],
    ['Loyer de base',fmt(bail.loyer)],['Caution',fmt(bail.caution||0)],
    ['Révision',bail.revision==='0/0'?'Aucune':bail.revision.replace('/',' % / ')+' ans'],
    ['Engagement min.',(bail.engagementMin||0)+' mois'],['RIB',bail.rib||'–'],
    ['Notes',(bail.notes||'–').replace(/\n/g,' | ')]];
  document.getElementById('infoContent').innerHTML=rows.map(function(r){return'<div class="infoRow"><span>'+r[0]+'</span><span>'+r[1]+'</span></div>';}).join('');
}

// ══ OPEN BAIL MODAL (new or edit) ══
function openBailModal(id){
  editingBailId=id||null;
  var d=dbGet(),bail=id?d.baux.find(function(b){return b.id===id;}):null;
  document.getElementById('mdBailTitle').textContent=id?'Modifier le bail':'Nouveau bail';
  document.getElementById('btnSaveBail').textContent=id?'✓  Enregistrer les modifications':'✓  Enregistrer le bail';
  var fields=['nb_nom','nb_preneur','nb_rep','nb_adresse','nb_activite','nb_rib','nb_notes'];
  fields.forEach(function(f){document.getElementById(f).value=bail?(bail[f.replace('nb_','')]||''):'';});
  document.getElementById('nb_nom').value=bail?bail.nom:'';
  document.getElementById('nb_preneur').value=bail?bail.preneur:'';
  document.getElementById('nb_rep').value=bail?bail.rep:'';
  document.getElementById('nb_adresse').value=bail?bail.adresse:'';
  document.getElementById('nb_activite').value=bail?bail.activite:'';
  document.getElementById('nb_rib').value=bail?bail.rib:'';
  document.getElementById('nb_notes').value=bail?bail.notes:'';
  document.getElementById('nb_debut').value=bail?bail.debut:new Date().toISOString().split('T')[0];
  document.getElementById('nb_duree').value=bail?bail.duree:'';
  document.getElementById('nb_loyer').value=bail?bail.loyer:'';
  document.getElementById('nb_caution').value=bail?bail.caution:'';
  document.getElementById('nb_revision').value=bail?bail.revision:'10/3';
  document.getElementById('nb_franchise').value=bail?(bail.franchise||0):'';
  document.getElementById('nb_engMin').value=bail?(bail.engagementMin||0):'';
  document.getElementById('nb_t1m').value=(bail&&bail.tranches&&bail.tranches[0])?bail.tranches[0].montant:'';
  document.getElementById('nb_t1d').value=(bail&&bail.tranches&&bail.tranches[0])?bail.tranches[0].duree:'';
  document.getElementById('nb_t2m').value=(bail&&bail.tranches&&bail.tranches[1])?bail.tranches[1].montant:'';
  document.getElementById('nb_t2d').value=(bail&&bail.tranches&&bail.tranches[1])?bail.tranches[1].duree:'';
  document.getElementById('ovBail').classList.add('open');
}
document.getElementById('btnAdd').addEventListener('click',function(){openBailModal(null);});
document.getElementById('btnEditB').addEventListener('click',function(){if(currentBailId)openBailModal(currentBailId);});
document.getElementById('btnEditBail2').addEventListener('click',function(){if(currentBailId)openBailModal(currentBailId);});

document.getElementById('btnSaveBail').addEventListener('click',function(){
  var nom=document.getElementById('nb_nom').value.trim();if(!nom){toast('⚠ Nom requis');return;}
  var d=dbGet();
  var t1m=parseInt(document.getElementById('nb_t1m').value)||0,t1d=parseInt(document.getElementById('nb_t1d').value)||0;
  var t2m=parseInt(document.getElementById('nb_t2m').value)||0,t2d=parseInt(document.getElementById('nb_t2d').value)||0;
  var tranches=[];if(t1m&&t1d)tranches.push({montant:t1m,duree:t1d});if(t2m&&t2d)tranches.push({montant:t2m,duree:t2d});
  var data={nom:nom,preneur:document.getElementById('nb_preneur').value.trim()||'–',rep:document.getElementById('nb_rep').value.trim(),
    adresse:document.getElementById('nb_adresse').value.trim(),activite:document.getElementById('nb_activite').value.trim(),
    debut:document.getElementById('nb_debut').value||new Date().toISOString().split('T')[0],
    duree:parseInt(document.getElementById('nb_duree').value)||9,loyer:parseInt(document.getElementById('nb_loyer').value)||0,
    caution:parseInt(document.getElementById('nb_caution').value)||0,rib:document.getElementById('nb_rib').value.trim(),
    revision:document.getElementById('nb_revision').value,franchise:parseInt(document.getElementById('nb_franchise').value)||0,
    engagementMin:parseInt(document.getElementById('nb_engMin').value)||0,
    tranches:tranches,notes:document.getElementById('nb_notes').value.trim()};
  if(editingBailId){
    var idx=d.baux.findIndex(function(b){return b.id===editingBailId;});
    if(idx>=0){var old=d.baux[idx];d.baux[idx]=Object.assign({},old,data);}
    dbSave(d);document.getElementById('ovBail').classList.remove('open');
    toast('✓ Bail mis à jour');renderHome();
    if(currentBailId===editingBailId)renderDetail();
  } else {
    var id=uid();data.id=id;data.color=nextColor();
    d.baux.push(data);d.paiements[id]={};dbSave(d);
    document.getElementById('ovBail').classList.remove('open');toast('✓ Bail enregistré');renderHome();
  }
  editingBailId=null;
});

// ══ OPEN PAY MODAL ══
function openPayModal(key,isEdit){
  editingPayKey=isEdit?key:null;
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  document.getElementById('payTitle').textContent=(isEdit?'Modifier paiement':'Paiement')+' – '+bail.nom;
  document.getElementById('btnSavePay').textContent=isEdit?'✓  Enregistrer les modifications':'✓  Enregistrer';
  // Select month
  if(key){var sel=document.getElementById('payMois');for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===key){sel.selectedIndex=i;break;}}}
  // Pre-fill
  var p=isEdit?(d.paiements[currentBailId]||{})[key]:null;
  if(p){document.getElementById('payMt').value=p.montant;document.getElementById('payDt').value=p.date||'';document.getElementById('payNote').value=p.note||'';}
  else{
    var ech=buildEch(bail),mois=ech.find(function(m){return m.key===key;});
    document.getElementById('payMt').value=mois?mois.due:'';
    document.getElementById('payDt').value=new Date().toISOString().split('T')[0];
    document.getElementById('payNote').value='';
  }
  document.getElementById('ovPay').classList.add('open');
}

document.getElementById('btnAddPay').addEventListener('click',function(){
  editingPayKey=null;
  document.getElementById('payTitle').textContent='Paiement – '+(dbGet().baux.find(function(b){return b.id===currentBailId;})||{nom:''}).nom;
  document.getElementById('btnSavePay').textContent='✓  Enregistrer';
  document.getElementById('payMt').value='';document.getElementById('payDt').value=new Date().toISOString().split('T')[0];document.getElementById('payNote').value='';
  document.getElementById('ovPay').classList.add('open');
});

// Delegation for pay buttons in suivi
document.getElementById('loyersList').addEventListener('click',function(e){
  var btn=e.target;while(btn&&btn!==this){
    if(btn.classList.contains('btnPay')){openPayModal(btn.dataset.key,false);return;}
    if(btn.classList.contains('btnEPay')){openPayModal(btn.dataset.key,true);return;}
    if(btn.classList.contains('btnDPay')){
      var k=btn.dataset.key;
      showConfirm('Supprimer ce paiement ?',function(){
        var d2=dbGet();if(d2.paiements[currentBailId])delete d2.paiements[currentBailId][k];
        dbSave(d2);renderDetail();toast('Paiement supprimé');
      });return;
    }
    btn=btn.parentElement;
  }
});

document.getElementById('btnSavePay').addEventListener('click',function(){
  var key=document.getElementById('payMois').value;
  var montant=parseInt(document.getElementById('payMt').value)||0;
  var date=document.getElementById('payDt').value,mode=document.getElementById('payMod').value,note=document.getElementById('payNote').value;
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  var ech=buildEch(bail),mois=ech.find(function(m){return m.key===key;});
  var statut=montant>=(mois?mois.due:0)?'paye':montant>0?'partiel':'impaye';
  if(!d.paiements[currentBailId])d.paiements[currentBailId]={};
  d.paiements[currentBailId][key]={montant:montant,date:date,mode:mode,note:note,statut:statut};
  dbSave(d);document.getElementById('ovPay').classList.remove('open');editingPayKey=null;
  renderDetail();toast('✓ Paiement enregistré');
});

document.getElementById('btnPDF').addEventListener('click',function(){exportPDF();});
function exportPDF(){
  if(!window.jspdf){toast('⚠ PDF non disponible');return;}
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  if(!bail)return;
  var ech=buildEch(bail),paid=d.paiements[currentBailId]||{},stats=computeStats(ech,paid);
  var doc=new window.jspdf.jsPDF('p','mm','a4');
  var pageW=210,margin=14;
  // ── HEADER ──
  doc.setFillColor(22,20,16);doc.rect(0,0,pageW,38,'F');
  doc.setFillColor(200,161,69);doc.rect(0,36,pageW,2,'F');
  doc.setTextColor(200,161,69);doc.setFontSize(22);doc.setFont('helvetica','bold');
  doc.text('ABOUALI',margin,15);
  doc.setTextColor(154,143,125);doc.setFontSize(8);doc.setFont('helvetica','normal');
  doc.text('GESTION DES BAUX COMMERCIAUX',margin,22);
  doc.setTextColor(226,196,122);doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text(bail.nom,margin,31);
  doc.setTextColor(107,98,84);doc.setFontSize(7.5);doc.setFont('helvetica','normal');
  doc.text('Généré le '+new Date().toLocaleDateString('fr-FR')+' à '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),pageW-margin,31,{align:'right'});
  // ── BAIL INFO ──
  var debut=new Date(bail.debut+'T00:00:00'),fin=new Date(debut);fin.setFullYear(fin.getFullYear()+bail.duree);fin.setDate(fin.getDate()-1);
  var infoData=[
    [bail.preneur||'–',bail.rep||'–'],
    [bail.adresse||'–',bail.activite||'–'],
    [debut.toLocaleDateString('fr-FR')+' → '+fin.toLocaleDateString('fr-FR'),bail.duree+' ans'],
    [fmt(bail.loyer)+'/mois',fmt(bail.caution||0)+' caution'],
    [bail.revision==='0/0'?'Aucune révision':'+'+bail.revision.replace('/',' % / ')+' ans',(bail.engagementMin||0)+' mois engagement min.'],
    [bail.rib||'–','']
  ];
  var infoLabels=[['Preneur','Représentant'],['Adresse','Activité'],['Période','Durée'],['Loyer de base','Caution'],['Révision','Engagement min.'],['RIB','']];
  doc.autoTable({startY:42,head:[],body:infoData.map(function(row,i){return[infoLabels[i][0]+': '+row[0],infoLabels[i][1]?infoLabels[i][1]+': '+row[1]:''];}),
    styles:{fontSize:8.5,cellPadding:{top:3,bottom:3,left:4,right:4},textColor:[237,232,223]},
    columnStyles:{0:{cellWidth:95},1:{cellWidth:95}},
    alternateRowStyles:{fillColor:[22,20,16]},
    bodyStyles:{fillColor:[26,22,16]},
    tableLineColor:[47,43,34],tableLineWidth:0.2,
    margin:{left:margin,right:margin}});
  // ── SUMMARY ──
  var sy=doc.lastAutoTable.finalY+6;
  doc.autoTable({startY:sy,
    head:[['Total encaissé','Total impayé','Restant à percevoir','Mois payés','Taux de recouvrement']],
    body:[[fmt(stats.enc),fmt(stats.imp),fmt(stats.rest),stats.mp+'/'+stats.total,stats.total>0?Math.round(stats.mp/stats.total*100)+'%':'–']],
    styles:{fontSize:9,halign:'center',cellPadding:{top:4,bottom:4,left:3,right:3}},
    headStyles:{fillColor:[22,20,16],textColor:[200,161,69],fontStyle:'bold',fontSize:8},
    bodyStyles:{fillColor:[26,22,16],textColor:[237,232,223]},
    columnStyles:{0:{textColor:[95,168,100]},1:{textColor:[217,95,75]}},
    tableLineColor:[47,43,34],tableLineWidth:0.2,margin:{left:margin,right:margin}});
  // ── PAYMENT HISTORY ──
  var py=doc.lastAutoTable.finalY+6;
  doc.setTextColor(107,98,84);doc.setFontSize(8);doc.setFont('helvetica','bold');
  doc.text('HISTORIQUE DES PAIEMENTS',margin,py+4);
  var payRows=ech.filter(function(m){return!m.isFr;}).map(function(mois){
    var s=getStatut(mois,paid),p=paid[mois.key];
    var pillTxtFull={paye:'Payé',impaye:'Impayé',partiel:'Partiel',attente:'À venir'}[s]||s;
    return[mois.label,fmt(mois.due),p?fmt(p.montant):'–',pillTxtFull,p?fmtDate(p.date):'–',p?p.mode||'–':'–',p&&p.note?p.note:''];
  });
  doc.autoTable({startY:py+7,
    head:[['Mois','Dû','Reçu','Statut','Date','Mode','Note']],
    body:payRows,
    styles:{fontSize:8,cellPadding:{top:3,bottom:3,left:3,right:3},textColor:[237,232,223],overflow:'ellipsize'},
    headStyles:{fillColor:[22,20,16],textColor:[200,161,69],fontStyle:'bold'},
    bodyStyles:{fillColor:[26,22,16]},
    alternateRowStyles:{fillColor:[22,20,16]},
    columnStyles:{0:{cellWidth:32},1:{cellWidth:24},2:{cellWidth:24},3:{cellWidth:20},4:{cellWidth:22},5:{cellWidth:28},6:{cellWidth:36}},
    willDrawCell:function(data){
      if(data.section==='body'&&data.column.index===3){
        var v=data.cell.raw;
        if(v==='Payé')data.cell.styles.textColor=[95,168,100];
        else if(v==='Impayé')data.cell.styles.textColor=[217,95,75];
        else if(v==='Partiel')data.cell.styles.textColor=[212,136,58];
        else data.cell.styles.textColor=[107,98,84];
      }
    },
    tableLineColor:[47,43,34],tableLineWidth:0.2,margin:{left:margin,right:margin}});
  // ── FOOTER ──
  var pageCount=doc.internal.getNumberOfPages();
  for(var i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFillColor(22,20,16);doc.rect(0,287,pageW,10,'F');
    doc.setTextColor(107,98,84);doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.text('Abouali – Gestion des baux commerciaux',margin,293);
    doc.text('Page '+i+'/'+pageCount,pageW-margin,293,{align:'right'});
  }
  // ── SAVE ──
  var fname='Bail_'+bail.nom.replace(/\s+/g,'_')+'_'+new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')+'.pdf';
  if(/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream){window.open(doc.output('bloburl'),'_blank');}
  else{doc.save(fname);}
  toast('📄 PDF généré');
}

document.getElementById('btnXLS').addEventListener('click',function(){exportExcel();});
function exportExcel(){
  if(!window.XLSX){toast('⚠ Excel non disponible');return;}
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  if(!bail)return;
  var ech=buildEch(bail),paid=d.paiements[currentBailId]||{},stats=computeStats(ech,paid);
  var wb=XLSX.utils.book_new();
  // ── SHEET 1: RÉSUMÉ ──
  var debut=new Date(bail.debut+'T00:00:00'),fin=new Date(debut);fin.setFullYear(fin.getFullYear()+bail.duree);fin.setDate(fin.getDate()-1);
  var resume=[
    ['ABOUALI – GESTION DES BAUX COMMERCIAUX'],[''],
    ['INFORMATIONS DU BAIL'],
    ['Nom du local',bail.nom],['Preneur',bail.preneur],['Représentant',bail.rep],
    ['Adresse',bail.adresse],['Activité',bail.activite],
    ['Début du bail',debut.toLocaleDateString('fr-FR')],['Fin du bail',fin.toLocaleDateString('fr-FR')],
    ['Durée',bail.duree+' ans'],['Loyer de base',bail.loyer],['Caution',bail.caution||0],
    ['RIB',bail.rib],['Révision',bail.revision==='0/0'?'Aucune':bail.revision],
    ['Engagement min.',(bail.engagementMin||0)+' mois'],[''],
    ['SYNTHÈSE FINANCIÈRE'],
    ['Total encaissé',stats.enc],['Total impayé',stats.imp],['Restant à percevoir',stats.rest],
    ['Mois payés',stats.mp+'/'+stats.total],['Taux de recouvrement',stats.total>0?Math.round(stats.mp/stats.total*100)/100:''],
    ['','Généré le '+new Date().toLocaleDateString('fr-FR')]
  ];
  var ws1=XLSX.utils.aoa_to_sheet(resume);
  ws1['!cols']=[{wch:28},{wch:45}];
  XLSX.utils.book_append_sheet(wb,ws1,'Résumé');
  // ── SHEET 2: PAIEMENTS ──
  var payHdr=[['Mois','Mois (clé)','Montant dû (DHS)','Montant reçu (DHS)','Statut','Date réception','Mode','Référence/Note']];
  var payRows=ech.filter(function(m){return!m.isFr;}).map(function(mois){
    var s=getStatut(mois,paid),p=paid[mois.key];
    var sl={paye:'Payé',impaye:'Impayé',partiel:'Partiel',attente:'À venir'}[s]||s;
    return[mois.label,mois.key,mois.due,p?p.montant:0,sl,p?fmtDate(p.date):'–',p?p.mode||'–':'–',p&&p.note?p.note:''];
  });
  var ws2=XLSX.utils.aoa_to_sheet(payHdr.concat(payRows));
  ws2['!cols']=[{wch:22},{wch:10},{wch:18},{wch:18},{wch:12},{wch:16},{wch:18},{wch:30}];
  ws2['!autofilter']={ref:'A1:H1'};
  XLSX.utils.book_append_sheet(wb,ws2,'Paiements');
  // ── SHEET 3: ÉCHEANCIER ──
  var echHdr=[['Période','Mois (clé)','Loyer mensuel (DHS)','Type','Cumul dû (DHS)']];
  var cumul=0;
  var echRows=ech.map(function(m){cumul+=m.due;return[m.label,m.key,m.due,m.isFr?'Franchise':m.due===bail.loyer?'Loyer base':'Transitoire',cumul];});
  var ws3=XLSX.utils.aoa_to_sheet(echHdr.concat(echRows));
  ws3['!cols']=[{wch:22},{wch:10},{wch:22},{wch:14},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws3,'Échéancier');
  // ── SAVE ──
  var fname='Bail_'+bail.nom.replace(/\s+/g,'_')+'_'+new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')+'.xlsx';
  var wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  var blob=new Blob([wbout],{type:'application/octet-stream'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(url);document.body.removeChild(a);},200);
  toast('📊 Excel généré');
}
