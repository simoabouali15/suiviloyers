<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Abouali">
<meta name="theme-color" content="#0c0b08">
<title>Abouali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap');
:root{--bg:#0c0b08;--s1:#161410;--s2:#1e1b15;--s3:#26221a;--border:#2f2b22;--gold:#c8a145;--gold2:#e2c47a;--amber:#d4883a;--green:#5fa864;--red:#d95f4b;--blue:#4a82c4;--text:#ede8df;--muted:#6b6254;--muted2:#9a8f7d;--safe-top:env(safe-area-inset-top,44px);--safe-bot:env(safe-area-inset-bottom,20px);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;-webkit-text-size-adjust:100%;}
.view{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;}
.view.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#viewHome{background:var(--bg);}
.homeHeader{background:var(--s1);border-bottom:1px solid var(--border);padding-top:calc(var(--safe-top) + 12px);padding-left:18px;padding-right:18px;padding-bottom:14px;flex-shrink:0;}
.homeBrand{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px;}
.brandName{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:700;color:var(--gold);letter-spacing:-1px;line-height:1;}
.brandSub{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:2px;margin-top:3px;}
.brandDate{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted2);text-align:right;line-height:1.5;}
.kpiRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.kpi{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.kpiVal{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:500;line-height:1;}
.kpiVal.g{color:var(--green);}.kpiVal.r{color:var(--red);}.kpiVal.a{color:var(--gold2);}
.kpiLbl{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.6px;}
.secLbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:14px 18px 7px;}
.bailCard{background:var(--s2);border:1px solid var(--border);border-radius:14px;margin:0 14px 9px;padding:14px 14px 14px 18px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s;-webkit-user-select:none;}
.bailCard:active{background:var(--s3);}
.bailCardAccent{position:absolute;left:0;top:0;bottom:0;width:3px;}
.bailCardTop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.bailCardName{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--text);line-height:1.1;}
.bailCardPreneur{font-size:11px;color:var(--muted2);margin-top:2px;}
.bailCardChev{color:var(--muted);font-size:16px;margin-top:3px;flex-shrink:0;}
.bailStats{display:flex;gap:7px;}
.bStat{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;}
.bStatVal{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;}
.bStatLbl{font-size:8px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.btnAddBail{margin:4px 14px 0;width:calc(100% - 28px);background:transparent;border:2px dashed var(--border);border-radius:14px;padding:16px;color:var(--muted2);font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btnAddBail:active{border-color:var(--gold);color:var(--gold);}
.scrollPad{height:calc(var(--safe-bot) + 20px);}
#viewBail{background:var(--bg);}
.topbar{display:flex;align-items:center;gap:10px;padding-top:calc(var(--safe-top) + 8px);padding-left:14px;padding-right:14px;padding-bottom:10px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tbBack{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:var(--gold);flex-shrink:0;font-family:'Outfit',sans-serif;}
.tbTitle{flex:1;min-width:0;}
.tbTitle h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbTitle p{font-size:10px;color:var(--muted2);margin-top:1px;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbAction{width:34px;height:34px;border-radius:9px;background:var(--gold);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#0c0b08;font-weight:700;flex-shrink:0;font-family:'Outfit',sans-serif;}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.tabBtn{flex:1;padding:10px 4px;font-size:12px;font-weight:600;color:var(--muted2);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;font-family:'Outfit',sans-serif;}
.tabBtn.active{color:var(--gold);border-bottom-color:var(--gold);}
.miniStats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:9px 14px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;}
.miniKpi{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:8px 4px;text-align:center;}
.miniKpiVal{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;line-height:1;}
.miniKpiLbl{font-size:8px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
.tabPane{display:none;}.tabPane.active{display:block;}
.loyerCard{background:var(--s2);border:1px solid var(--border);border-radius:12px;margin:0 14px 8px;overflow:hidden;cursor:pointer;}
.loyerCard:active{background:var(--s3);}
.lcHead{display:flex;justify-content:space-between;align-items:center;padding:12px 14px 12px 17px;position:relative;}
.lcHead::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.loyerCard.paye .lcHead::before{background:var(--green);}
.loyerCard.impaye .lcHead::before{background:var(--red);}
.loyerCard.partiel .lcHead::before{background:var(--amber);}
.loyerCard.attente .lcHead::before{background:var(--muted);}
.loyerCard.franchise .lcHead::before{background:var(--blue);}
.lcMois{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;}
.lcRight{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
.lcMontant{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold2);}
.pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;}
.pill.paye{background:rgba(95,168,100,.15);color:var(--green);border:1px solid rgba(95,168,100,.3);}
.pill.impaye{background:rgba(217,95,75,.15);color:var(--red);border:1px solid rgba(217,95,75,.3);}
.pill.partiel{background:rgba(212,136,58,.15);color:var(--amber);border:1px solid rgba(212,136,58,.3);}
.pill.attente{background:rgba(107,98,84,.15);color:var(--muted2);border:1px solid rgba(107,98,84,.2);}
.pill.franchise{background:rgba(74,130,196,.15);color:var(--blue);border:1px solid rgba(74,130,196,.3);}
.lcDetail{display:none;padding:0 14px 12px;border-top:1px solid var(--border);}
.lcDetail.open{display:block;}
.dRow{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;}
.dRow span:first-child{color:var(--muted2);}
.dRow span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text);font-size:11px;}
.btnPay{width:100%;margin-top:9px;background:linear-gradient(135deg,var(--gold),var(--amber));color:#0c0b08;font-weight:700;font-size:13px;padding:10px;border:none;border-radius:9px;cursor:pointer;font-family:'Outfit',sans-serif;}
.infoRow{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:10px;}
.infoRow span:first-child{color:var(--muted2);flex-shrink:0;font-size:12px;}
.infoRow span:last-child{font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;word-break:break-all;}
.echTable{background:var(--s2);border:1px solid var(--border);border-radius:12px;margin:0 14px;overflow:hidden;}
.echHead{display:grid;grid-template-columns:2fr 1.5fr 1fr;padding:8px 12px;background:var(--s3);border-bottom:1px solid var(--border);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;}
.echRow{display:grid;grid-template-columns:2fr 1.5fr 1fr;padding:9px 12px;border-bottom:1px solid var(--border);align-items:center;}
.echRow:last-child{border-bottom:none;}
.echRow .em{font-family:'JetBrains Mono',monospace;color:var(--gold2);font-size:11px;}
.echRow .ed{font-size:11px;color:var(--muted2);}
.deleteZone{margin:14px;padding:12px;border-radius:10px;background:rgba(217,95,75,.07);border:1px solid rgba(217,95,75,.22);text-align:center;}
.btnDel{background:none;border:none;color:var(--red);font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;padding:4px 12px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--s2);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:18px 18px 0 0;padding:18px 18px calc(var(--safe-bot) + 24px);width:100%;max-width:480px;animation:slideUp .28s cubic-bezier(.4,0,.2,1);max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mdDrag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.mdTitle{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.fLbl{font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block;}
.fIn,.fSel{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:16px;font-family:'Outfit',sans-serif;outline:none;-webkit-appearance:none;appearance:none;margin-bottom:11px;}
.fIn:focus,.fSel:focus{border-color:var(--gold);}
.fRow{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.fRow .fIn,.fRow .fSel{margin-bottom:0;}
.btnSubmit{width:100%;background:linear-gradient(135deg,var(--gold),var(--amber));color:#0c0b08;font-weight:700;font-size:15px;padding:14px;border:none;border-radius:12px;cursor:pointer;margin-top:4px;font-family:'Outfit',sans-serif;}
.btnCancel{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted2);font-size:14px;padding:12px;border-radius:12px;cursor:pointer;margin-top:8px;font-family:'Outfit',sans-serif;}
#confirmBox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:600;align-items:flex-end;justify-content:center;}
#confirmBox.open{display:flex;}
#confirmInner{background:var(--s2);border:1px solid var(--border);border-top:2px solid var(--red);border-radius:18px 18px 0 0;padding:22px 18px calc(var(--safe-bot) + 24px);width:100%;max-width:480px;animation:slideUp .28s cubic-bezier(.4,0,.2,1);}
#confirmMsg{font-size:15px;color:var(--text);text-align:center;line-height:1.5;margin-bottom:20px;}
.btnCfYes{width:100%;background:var(--red);color:#fff;font-weight:700;font-size:15px;padding:13px;border:none;border-radius:12px;cursor:pointer;font-family:'Outfit',sans-serif;}
.btnCfNo{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted2);font-size:14px;padding:12px;border-radius:12px;cursor:pointer;margin-top:8px;font-family:'Outfit',sans-serif;}
#toast{position:fixed;bottom:calc(var(--safe-bot) + 16px);left:50%;transform:translateX(-50%) translateY(80px);background:var(--s3);border:1px solid var(--border);border-radius:20px;padding:9px 20px;font-size:13px;color:var(--text);transition:transform .3s,opacity .3s;opacity:0;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<div class="view" id="viewHome">
  <div class="homeHeader">
    <div class="homeBrand">
      <div><div class="brandName">Abouali</div><div class="brandSub">Gestion des baux commerciaux</div></div>
      <div class="brandDate" id="homeDate"></div>
    </div>
    <div class="kpiRow">
      <div class="kpi"><div class="kpiVal a" id="kpiLoyers">–</div><div class="kpiLbl">Loyers/mois</div></div>
      <div class="kpi"><div class="kpiVal g" id="kpiEnc">–</div><div class="kpiLbl">Encaissé</div></div>
      <div class="kpi"><div class="kpiVal r" id="kpiImp">–</div><div class="kpiLbl">Impayé</div></div>
    </div>
  </div>
  <div class="scroll">
    <div class="secLbl">Baux actifs</div>
    <div id="bailsList"></div>
    <button class="btnAddBail" id="btnAddBail">＋&nbsp; Ajouter un bail</button>
    <div class="scrollPad"></div>
  </div>
</div>

<div class="view hidden" id="viewBail">
  <div class="topbar">
    <div class="tbBack" id="btnBack">‹</div>
    <div class="tbTitle"><h2 id="dName">–</h2><p id="dSub">–</p></div>
    <button class="tbAction" id="btnAddPay">＋</button>
  </div>
  <div class="tabs">
    <button class="tabBtn active" data-tab="tabSuivi">Suivi</button>
    <button class="tabBtn" data-tab="tabEch">Échéancier</button>
    <button class="tabBtn" data-tab="tabInfos">Infos</button>
  </div>
  <div class="miniStats">
    <div class="miniKpi"><div class="miniKpiVal g" id="dPaye">–</div><div class="miniKpiLbl">Encaissé</div></div>
    <div class="miniKpi"><div class="miniKpiVal r" id="dImp">–</div><div class="miniKpiLbl">Impayé</div></div>
    <div class="miniKpi"><div class="miniKpiVal a" id="dMois">–</div><div class="miniKpiLbl">Mois payés</div></div>
  </div>
  <div class="scroll">
    <div class="tabPane active" id="tabSuivi"><div style="height:10px"></div><div id="loyersList"></div><div class="scrollPad"></div></div>
    <div class="tabPane" id="tabEch"><div style="height:10px"></div><div class="secLbl" style="padding-top:0">Barème contractuel</div><div class="echTable" id="echTable"><div class="echHead"><span>Début</span><span>Loyer/mois</span><span>Durée</span></div></div><div class="scrollPad"></div></div>
    <div class="tabPane" id="tabInfos"><div style="height:10px"></div><div class="secLbl" style="padding-top:0">Détails du contrat</div><div id="infosContent" style="background:var(--s2);border:1px solid var(--border);border-radius:12px;margin:0 14px;overflow:hidden;"></div><div class="deleteZone"><button class="btnDel" id="btnDelBail">🗑&nbsp; Supprimer ce bail</button></div><div class="scrollPad"></div></div>
  </div>
</div>

<div class="overlay" id="ovNewBail">
<div class="modal">
  <div class="mdDrag"></div>
  <div class="mdTitle">Nouveau bail</div>
  <label class="fLbl">Nom du local *</label><input class="fIn" id="nb_nom" placeholder="ex: Al Warda 11">
  <label class="fLbl">Preneur</label><input class="fIn" id="nb_preneur" placeholder="ex: Société MIMAN">
  <label class="fLbl">Représentant légal</label><input class="fIn" id="nb_rep" placeholder="ex: Mounir MIMAN">
  <label class="fLbl">Adresse</label><input class="fIn" id="nb_adresse" placeholder="ex: Kissariat Atlassi">
  <label class="fLbl">Activité autorisée</label><input class="fIn" id="nb_activite" placeholder="ex: Restauration">
  <div class="fRow"><div><label class="fLbl">Début bail</label><input class="fIn" id="nb_debut" type="date"></div><div><label class="fLbl">Durée (ans)</label><input class="fIn" id="nb_duree" type="number" placeholder="9" min="1"></div></div>
  <label class="fLbl">Loyer de base (DHS)</label><input class="fIn" id="nb_loyer" type="number" placeholder="22000">
  <label class="fLbl">Caution versée (DHS)</label><input class="fIn" id="nb_caution" type="number" placeholder="132000">
  <label class="fLbl">RIB bancaire</label><input class="fIn" id="nb_rib" placeholder="007 450 0006…">
  <label class="fLbl">Révision loyer</label>
  <select class="fSel" id="nb_revision"><option value="10/3">+10% tous les 3 ans</option><option value="5/3">+5% tous les 3 ans</option><option value="0/0">Pas de révision</option></select>
  <label class="fLbl">Mois gratuits (franchise)</label><input class="fIn" id="nb_franchise" type="number" placeholder="1" min="0">
  <label class="fLbl">Loyer transitoire 1 — montant / durée (mois)</label>
  <div class="fRow"><input class="fIn" id="nb_t1m" type="number" placeholder="18000"><input class="fIn" id="nb_t1d" type="number" placeholder="5"></div>
  <label class="fLbl">Loyer transitoire 2 — montant / durée (mois)</label>
  <div class="fRow"><input class="fIn" id="nb_t2m" type="number" placeholder="20000"><input class="fIn" id="nb_t2d" type="number" placeholder="6"></div>
  <button class="btnSubmit" id="btnSaveBail">✓&nbsp; Enregistrer le bail</button>
  <button class="btnCancel" id="btnCancelBail">Annuler</button>
</div></div>

<div class="overlay" id="ovPay">
<div class="modal">
  <div class="mdDrag"></div>
  <div class="mdTitle" id="payTitle">Enregistrer paiement</div>
  <label class="fLbl">Mois concerné</label><select class="fSel" id="payMois"></select>
  <label class="fLbl">Montant reçu (DHS)</label><input class="fIn" id="payMontant" type="number" placeholder="18000">
  <div class="fRow"><div><label class="fLbl">Date réception</label><input class="fIn" id="payDate" type="date"></div><div><label class="fLbl">Mode</label><select class="fSel" id="payMode"><option>Virement bancaire</option><option>Chèque</option><option>Espèces</option></select></div></div>
  <label class="fLbl">Référence / note</label><input class="fIn" id="payNote" placeholder="Référence virement…">
  <button class="btnSubmit" id="btnSavePay">✓&nbsp; Enregistrer</button>
  <button class="btnCancel" id="btnCancelPay">Annuler</button>
</div></div>

<div id="confirmBox"><div id="confirmInner">
  <p id="confirmMsg"></p>
  <button class="btnCfYes" id="btnCfYes">Confirmer la suppression</button>
  <button class="btnCfNo" id="btnCfNo">Annuler</button>
</div></div>

<div id="toast"></div>

<script>
var DB='abouali_v5';
function dbGet(){try{return JSON.parse(localStorage.getItem(DB)||'null')||{baux:[],paiements:{}};}catch(e){return{baux:[],paiements:{}};}}
function dbSave(d){try{localStorage.setItem(DB,JSON.stringify(d));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function pad(n){return n<10?'0'+n:''+n;}
function initDB(){
  var d=dbGet();
  if(d.baux.length===0){
    var id='miman_001';
    d.baux.push({id:id,nom:'Al Warda 11 + Warda 4',preneur:'Société MIMAN',rep:'Mounir MIMAN',adresse:'Al Warda 11, RDC n°14, Kissariat Atlassi, Rue Fatima Ezzahra, Marrakech',activite:'Restauration (traiteurs et services de restauration)',debut:'2026-03-01',duree:9,loyer:22000,caution:132000,rib:'007 450 00061153004024 61 45',revision:'10/3',franchise:1,tranches:[{montant:18000,duree:5},{montant:20000,duree:6}],color:'#c8a145',notes:'TF Warda11:04/56386(25m²)|TF Warda4:04/56379(71m²). Interdiction alcool/tabac/jeux. Engagement min.2ans. Perte caution avant 28/02/2028. Caution solidaire:Mounir MIMAN. Signé 03/03/2026.'});
    d.paiements[id]={'2026-03':{montant:0,date:'2026-03-01',mode:'Franchise',note:'Mois gratuit contractuel',statut:'paye'},'2026-04':{montant:18000,date:'2026-04-07',mode:'Virement bancaire',note:'',statut:'paye'}};
    dbSave(d);
  }
}
function buildEch(bail){
  var months=[],cursor=new Date(bail.debut+'T00:00:00'),total=bail.duree*12;
  for(var i=0;i<total;i++){
    var y=cursor.getFullYear(),m=cursor.getMonth(),key=y+'-'+pad(m+1),label=cursor.toLocaleDateString('fr-FR',{month:'long',year:'numeric'}),due=bail.loyer,isFr=false,pos=i;
    if(pos<(bail.franchise||0)){due=0;isFr=true;}
    else{pos-=(bail.franchise||0);var consumed=0,found=false;for(var t=0;t<bail.tranches.length;t++){if(pos<consumed+bail.tranches[t].duree){due=bail.tranches[t].montant;found=true;break;}consumed+=bail.tranches[t].duree;}if(!found&&bail.revision&&bail.revision!=='0/0'){var pts=bail.revision.split('/'),pct=parseInt(pts[0]),every=parseInt(pts[1]),periods=Math.floor((pos-consumed)/(every*12));due=Math.round(bail.loyer*Math.pow(1+pct/100,periods));}}
    months.push({key:key,label:label,due:due,isFr:isFr});cursor.setMonth(cursor.getMonth()+1);
  }
  return months;
}
function getStatut(mois,paid){
  var now=new Date(),pts=mois.key.split('-'),mDate=new Date(parseInt(pts[0]),parseInt(pts[1])-1,1),p=paid[mois.key];
  if(mois.isFr)return'franchise';if(!p)return mDate>now?'attente':'impaye';if(p.montant>=mois.due)return'paye';if(p.montant>0)return'partiel';return mDate>now?'attente':'impaye';
}
function fmt(n){return n===0?'0 DHS':n.toLocaleString('fr-FR')+' DHS';}
function fmtK(n){if(n>=1000000)return(Math.round(n/100000)/10).toString().replace('.',',')+' M';if(n>=1000)return(Math.round(n/100)/10).toString().replace('.',',')+' k';return n.toLocaleString('fr-FR');}
var currentBailId=null,confirmCb=null,colorIdx=0;
var COLORS=['#c8a145','#4a82c4','#5fa864','#d4883a','#9a6cc8','#d95f4b','#4ab8c4'];
function nextColor(){return COLORS[colorIdx++%COLORS.length];}
function showView(id){document.querySelectorAll('.view').forEach(function(v){v.classList.add('hidden');});document.getElementById(id).classList.remove('hidden');}
function renderHome(){
  var d=dbGet(),now=new Date();
  document.getElementById('homeDate').innerHTML=now.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'})+'<br>'+now.getFullYear();
  var totL=0,totE=0,totI=0,list=document.getElementById('bailsList');list.innerHTML='';
  d.baux.forEach(function(bail){
    var ech=buildEch(bail),paid=d.paiements[bail.id]||{},enc=0,imp=0,mp=0;
    var paying=ech.filter(function(m){return!m.isFr&&m.due>0;});
    paying.forEach(function(mois){var s=getStatut(mois,paid),p=paid[mois.key];if(s==='paye'){mp++;enc+=mois.due;}if(s==='impaye')imp+=mois.due;if(s==='partiel'){enc+=(p?p.montant:0);imp+=mois.due-(p?p.montant:0);}});
    var mKey=now.getFullYear()+'-'+pad(now.getMonth()+1),mc=ech.find(function(m){return m.key===mKey;});
    totL+=mc?mc.due:0;totE+=enc;totI+=imp;
    var div=document.createElement('div');div.className='bailCard';
    div.innerHTML='<div class="bailCardAccent" style="background:'+(bail.color||'#c8a145')+'"></div><div class="bailCardTop"><div><div class="bailCardName">'+bail.nom+'</div><div class="bailCardPreneur">'+bail.preneur+'</div></div><div class="bailCardChev">›</div></div><div class="bailStats"><div class="bStat"><div class="bStatVal" style="color:var(--green)">'+fmtK(enc)+'</div><div class="bStatLbl">Encaissé</div></div><div class="bStat"><div class="bStatVal" style="color:'+(imp>0?'var(--red)':'var(--muted2)')+'">'+fmtK(imp)+'</div><div class="bStatLbl">Impayé</div></div><div class="bStat"><div class="bStatVal" style="color:var(--gold2)">'+mp+'/'+paying.length+'</div><div class="bStatLbl">Mois</div></div></div>';
    (function(bid){div.addEventListener('click',function(){openBail(bid);});})(bail.id);
    list.appendChild(div);
  });
  document.getElementById('kpiLoyers').textContent=fmtK(totL);document.getElementById('kpiEnc').textContent=fmtK(totE);document.getElementById('kpiImp').textContent=fmtK(totI);
}
function openBail(id){
  currentBailId=id;
  document.querySelectorAll('.tabBtn').forEach(function(b){b.classList.remove('active');});document.querySelectorAll('.tabPane').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tabBtn')[0].classList.add('active');document.getElementById('tabSuivi').classList.add('active');
  renderDetail();showView('viewBail');
}
function renderDetail(){
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});if(!bail)return;
  var ech=buildEch(bail),paid=d.paiements[currentBailId]||{},enc=0,imp=0,mp=0;
  document.getElementById('dName').textContent=bail.nom;document.getElementById('dSub').textContent=bail.preneur;document.getElementById('payTitle').textContent='Paiement – '+bail.nom;
  var paying=ech.filter(function(m){return!m.isFr&&m.due>0;});
  paying.forEach(function(mois){var s=getStatut(mois,paid),p=paid[mois.key];if(s==='paye'){mp++;enc+=mois.due;}if(s==='impaye')imp+=mois.due;if(s==='partiel'){enc+=(p?p.montant:0);imp+=mois.due-(p?p.montant:0);}});
  document.getElementById('dPaye').textContent=fmtK(enc);document.getElementById('dImp').textContent=fmtK(imp);document.getElementById('dMois').textContent=mp+'/'+paying.length;
  var sel=document.getElementById('payMois');sel.innerHTML='';
  ech.filter(function(m){return m.due>0;}).forEach(function(m){var opt=document.createElement('option');opt.value=m.key;opt.textContent=m.label+' — '+fmt(m.due);sel.appendChild(opt);});
  var list=document.getElementById('loyersList');list.innerHTML='';
  ech.forEach(function(mois){
    var s=getStatut(mois,paid),p=paid[mois.key],card=document.createElement('div');card.className='loyerCard '+s;
    var pillTxt={paye:'✓ Payé',impaye:'✗ Impayé',partiel:'~ Partiel',attente:'À venir',franchise:'Franchise'}[s]||s;
    var detHtml=p?'<div class="dRow"><span>Montant reçu</span><span>'+fmt(p.montant)+'</span></div><div class="dRow"><span>Date</span><span>'+(p.date||'–')+'</span></div><div class="dRow"><span>Mode</span><span>'+(p.mode||'–')+'</span></div>'+(p.note?'<div class="dRow"><span>Note</span><span>'+p.note+'</span></div>':''):'<div style="font-size:12px;color:var(--muted2);padding:6px 0 2px;text-align:center;">Aucun paiement enregistré</div>';
    var kStr=mois.key;
    card.innerHTML='<div class="lcHead"><div class="lcMois">'+mois.label+'</div><div class="lcRight"><span class="lcMontant">'+fmt(mois.due)+'</span><span class="pill '+s+'">'+pillTxt+'</span></div></div><div class="lcDetail" id="ld-'+kStr+'">'+detHtml+(s!=='franchise'?'<button class="btnPay" data-key="'+kStr+'">+ Enregistrer paiement</button>':'')+'</div>';
    card.querySelector('.lcHead').addEventListener('click',function(){var el=document.getElementById('ld-'+kStr);if(el)el.classList.toggle('open');});
    list.appendChild(card);
  });
  renderEchTable(ech);renderInfos(bail);
}
function renderEchTable(ech){
  var tbl=document.getElementById('echTable'),groups=[],cur=null;
  ech.forEach(function(m){if(!cur||cur.due!==m.due){if(cur)groups.push(cur);cur={debut:m.label,due:m.due,count:1,isFr:m.isFr};}else cur.count++;});
  if(cur)groups.push(cur);
  tbl.innerHTML='<div class="echHead"><span>Début</span><span>Loyer/mois</span><span>Durée</span></div>';
  groups.forEach(function(g){var row=document.createElement('div');row.className='echRow';row.innerHTML='<span class="ed">'+g.debut+'</span><span class="em">'+(g.isFr?'GRATUIT':fmt(g.due))+'</span><span class="ed">'+g.count+' mois</span>';tbl.appendChild(row);});
}
function renderInfos(bail){
  var debut=new Date(bail.debut+'T00:00:00'),fin=new Date(debut);fin.setFullYear(fin.getFullYear()+bail.duree);fin.setDate(fin.getDate()-1);
  var rows=[['Preneur',bail.preneur||'–'],['Représentant',bail.rep||'–'],['Adresse',bail.adresse||'–'],['Activité',bail.activite||'–'],['Début',debut.toLocaleDateString('fr-FR')],['Fin',fin.toLocaleDateString('fr-FR')],['Durée',bail.duree+' ans'],['Loyer de base',fmt(bail.loyer)],['Caution',fmt(bail.caution||0)],['Révision',bail.revision==='0/0'?'Aucune':bail.revision.replace('/',' % / ')+' ans'],['RIB',bail.rib||'–'],['Notes',bail.notes||'–']];
  document.getElementById('infosContent').innerHTML=rows.map(function(r){return'<div class="infoRow"><span>'+r[0]+'</span><span>'+r[1]+'</span></div>';}).join('');
}
document.querySelectorAll('.tabBtn').forEach(function(btn){btn.addEventListener('click',function(){document.querySelectorAll('.tabBtn').forEach(function(b){b.classList.remove('active');});document.querySelectorAll('.tabPane').forEach(function(p){p.classList.remove('active');});btn.classList.add('active');document.getElementById(btn.dataset.tab).classList.add('active');});});
document.getElementById('btnBack').addEventListener('click',function(){renderHome();showView('viewHome');});
document.getElementById('btnAddBail').addEventListener('click',function(){
  document.getElementById('nb_debut').value=new Date().toISOString().split('T')[0];
  ['nb_nom','nb_preneur','nb_rep','nb_adresse','nb_activite','nb_rib'].forEach(function(id){document.getElementById(id).value='';});
  ['nb_duree','nb_loyer','nb_caution','nb_franchise','nb_t1m','nb_t1d','nb_t2m','nb_t2d'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('ovNewBail').classList.add('open');
});
document.getElementById('btnCancelBail').addEventListener('click',function(){document.getElementById('ovNewBail').classList.remove('open');});
document.getElementById('btnSaveBail').addEventListener('click',function(){
  var nom=document.getElementById('nb_nom').value.trim();if(!nom){toast('⚠ Nom du local requis');return;}
  var d=dbGet(),id=uid(),t1m=parseInt(document.getElementById('nb_t1m').value)||0,t1d=parseInt(document.getElementById('nb_t1d').value)||0,t2m=parseInt(document.getElementById('nb_t2m').value)||0,t2d=parseInt(document.getElementById('nb_t2d').value)||0,tranches=[];
  if(t1m&&t1d)tranches.push({montant:t1m,duree:t1d});if(t2m&&t2d)tranches.push({montant:t2m,duree:t2d});
  d.baux.push({id:id,nom:nom,preneur:document.getElementById('nb_preneur').value.trim()||'–',rep:document.getElementById('nb_rep').value.trim(),adresse:document.getElementById('nb_adresse').value.trim(),activite:document.getElementById('nb_activite').value.trim(),debut:document.getElementById('nb_debut').value||new Date().toISOString().split('T')[0],duree:parseInt(document.getElementById('nb_duree').value)||9,loyer:parseInt(document.getElementById('nb_loyer').value)||0,caution:parseInt(document.getElementById('nb_caution').value)||0,rib:document.getElementById('nb_rib').value.trim(),revision:document.getElementById('nb_revision').value,franchise:parseInt(document.getElementById('nb_franchise').value)||0,tranches:tranches,color:nextColor(),notes:''});
  d.paiements[id]={};dbSave(d);document.getElementById('ovNewBail').classList.remove('open');toast('✓ Bail enregistré');renderHome();
});
document.getElementById('btnAddPay').addEventListener('click',function(){document.getElementById('payDate').value=new Date().toISOString().split('T')[0];document.getElementById('payMontant').value='';document.getElementById('payNote').value='';document.getElementById('ovPay').classList.add('open');});
document.getElementById('btnCancelPay').addEventListener('click',function(){document.getElementById('ovPay').classList.remove('open');});
document.getElementById('loyersList').addEventListener('click',function(e){
  var btn=e.target;while(btn&&!btn.classList.contains('btnPay')&&btn!==this)btn=btn.parentElement;if(!btn||!btn.classList.contains('btnPay'))return;
  var key=btn.dataset.key,sel=document.getElementById('payMois');
  for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===key){sel.selectedIndex=i;break;}}
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;});
  if(bail){var ech=buildEch(bail),mois=ech.find(function(m){return m.key===key;});if(mois)document.getElementById('payMontant').value=mois.due;}
  document.getElementById('payDate').value=new Date().toISOString().split('T')[0];document.getElementById('payNote').value='';document.getElementById('ovPay').classList.add('open');
});
document.getElementById('btnSavePay').addEventListener('click',function(){
  var key=document.getElementById('payMois').value,montant=parseInt(document.getElementById('payMontant').value)||0,date=document.getElementById('payDate').value,mode=document.getElementById('payMode').value,note=document.getElementById('payNote').value;
  var d=dbGet(),bail=d.baux.find(function(b){return b.id===currentBailId;}),ech=buildEch(bail),mois=ech.find(function(m){return m.key===key;}),statut=montant>=(mois?mois.due:0)?'paye':montant>0?'partiel':'impaye';
  if(!d.paiements[currentBailId])d.paiements[currentBailId]={};
  d.paiements[currentBailId][key]={montant:montant,date:date,mode:mode,note:note,statut:statut};
  dbSave(d);document.getElementById('ovPay').classList.remove('open');renderDetail();toast('✓ Paiement enregistré');
});
document.getElementById('btnDelBail').addEventListener('click',function(){showConfirm('Supprimer ce bail et tous ses paiements ?',function(){var d=dbGet();d.baux=d.baux.filter(function(b){return b.id!==currentBailId;});delete d.paiements[currentBailId];dbSave(d);toast('Bail supprimé');renderHome();showView('viewHome');});});
function showConfirm(msg,cb){document.getElementById('confirmMsg').textContent=msg;confirmCb=cb;document.getElementById('confirmBox').classList.add('open');}
document.getElementById('btnCfYes').addEventListener('click',function(){document.getElementById('confirmBox').classList.remove('open');if(confirmCb){confirmCb();confirmCb=null;}});
document.getElementById('btnCfNo').addEventListener('click',function(){document.getElementById('confirmBox').classList.remove('open');confirmCb=null;});
['ovNewBail','ovPay'].forEach(function(id){document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
initDB();renderHome();showView('viewHome');
</script>
